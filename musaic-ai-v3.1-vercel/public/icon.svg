<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#00a3ad" />
      <stop offset="100%" stop-color="#010b1e" />
    </radialGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37" />
      <stop offset="50%" stop-color="#f9e29c" />
      <stop offset="100%" stop-color="#d4af37" />
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="512" cy="512" r="480" fill="url(#bgGradient)" />
  <!-- Gold Bezel -->
  <circle cx="512" cy="512" r="480" stroke="url(#goldGradient)" stroke-width="40" />
  <!-- Music Note -->
  <text x="512" y="650" font-family="Arial, sans-serif" font-size="600" fill="white" text-anchor="middle" font-weight="bold">♪</text>
</svg>
